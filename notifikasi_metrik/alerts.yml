groups:
  - name: ml_model_alerts
    rules:
      - alert: HighPredictionErrorRate
        expr: rate(prediction_error_count_total[5m]) > 0.1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "High prediction error rate"
          description: "Prediction error rate is {{ $value }} errors/sec"

      - alert: HighPredictionLatency
        expr: histogram_quantile(0.95, rate(prediction_latency_seconds_bucket[5m])) > 1.0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High prediction latency"
          description: "95th percentile latency is {{ $value }} seconds"

      - alert: APIDown
        expr: up{job="breast-cancer-api"} == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "ML API is down"
          description: "Breast Cancer API has been down for more than 30 seconds"
